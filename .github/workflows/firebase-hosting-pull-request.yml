name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Secret
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is EMPTY or MISSING!"
            exit 1
          fi

      - name: Install and Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Verify Bundle
        working-directory: ./frontend
        run: |
          if grep -r "localhost:3001" dist/assets/*.js; then
            echo "ERROR: Build still contains localhost:3001! Build injection failed."
            exit 1
          fi
          echo "Build verified: No localhost found."
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URL_SHORTENER_3413B }}
          projectId: url-shortener-3413b
          entryPoint: ./frontend
